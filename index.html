<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luova | Creative Job Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #1a1a1a;        /* Charcoal Background */
            --text: #ffffff;      /* White Text */
            --accent: #ff69b4;    /* Pink Accent */
            --row-bg: #242424;    /* Slightly lighter charcoal for rows */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 60px 20px; 
            -webkit-font-smoothing: antialiased;
        }

        header { 
            max-width: 1100px; 
            margin: 0 auto 80px auto; 
            border-left: 8px solid var(--accent);
            padding-left: 30px;
        }

        h1 { 
            font-size: clamp(4rem, 15vw, 10rem); 
            font-weight: 900; 
            line-height: 0.8; 
            margin: 0; 
            letter-spacing: -0.05em; 
            text-transform: uppercase;
            color: var(--text);
        }

        .subtitle { 
            margin-top: 20px; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            font-weight: 700;
            color: var(--accent);
        }

        #job-container { 
            max-width: 1100px; 
            margin: 0 auto; 
        }

        .job-row { 
            display: grid; 
            grid-template-columns: 80px 1fr 1fr 120px; 
            align-items: center; 
            padding: 40px; 
            margin-bottom: 15px;
            background: var(--row-bg);
            border-radius: 4px;
            text-decoration: none; 
            color: inherit; 
            transition: 0.3s ease;
            border-left: 0px solid var(--accent);
        }

        .job-row:hover { 
            background: #2d2d2d;
            border-left: 10px solid var(--accent);
            transform: translateX(10px);
        }

        .logo-box img { 
            width: 60px; 
            height: 60px; 
            object-fit: contain;
            border-radius: 4px;
        }

        .job-main h2 { 
            margin: 0; 
            font-size: 1.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        .job-main p { 
            margin: 5px 0 0 0; 
            font-size: 1rem; 
            text-transform: uppercase; 
            color: var(--accent);
            font-weight: 700;
        }

        .highlights { 
            font-size: 0.9rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            text-align: right; 
            padding-right: 40px;
            opacity: 0.7;
        }

        .apply-btn {
            background: var(--accent);
            color: #000;
            padding: 10px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-radius: 2px;
        }

        @media (max-width: 768px) { 
            .job-row { grid-template-columns: 1fr; gap: 20px; } 
            .highlights { text-align: left; padding: 0; }
            h1 { font-size: 5rem; } 
        }
    </style>
</head>
<body>

<header>
    <h1>LUOVA</h1>
    <div class="subtitle">Creative Opportunities / No. 01</div>
</header>

<div id="job-container">
    <!-- Automated Load -->
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgQ56w58aNx1I8iF-VpUfpvBTANake0ZbTP9tvWWeJmrYGf6602Mhhgw2Nz8IxR3WpGMYEX3WAMalf/pub?gid=0&single=true&output=csv';

    async function fetchJobs() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const lines = data.split(/\r?\n/);
            const container = document.getElementById('job-container');
            container.innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                const title = (cols[0] || "New Role").replace(/"/g, '');
                const company = (cols[1] || "Studio").replace(/"/g, '');
                const image = (cols[2] || "").replace(/"/g, '').trim();
                const highlight = (cols[3] || "").replace(/"/g, '');
                const link = (cols[4] || "#").replace(/"/g, '').trim();

                container.innerHTML += `
                    <a href="${link}" class="job-row" target="_blank">
                        <div class="logo-box">
                            <img src="${image}" onerror="this.src='https://via.placeholder.com/60/ff69b4/000000?text=LOGO'">
                        </div>
                        <div class="job-main">
                            <h2>${title}</h2>
                            <p>${company}</p>
                        </div>
                        <div class="highlights">${highlight}</div>
                        <div class="apply-btn">View Job</div>
                    </a>`;
            }
        } catch (e) {
            document.getElementById('job-container').innerHTML = "Error loading jobs.";
        }
    }
    fetchJobs();
</script>
</body>
</html>
